name: Super Agent Eval

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  super-agent-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Super Agent golden eval
        run: npm run eval:super-agent

      - name: Run Super Agent policy eval
        run: npm run eval:super-agent-policy

      - name: Run Super Agent tool catalog eval
        run: npm run eval:super-agent-catalog

      - name: Run Super Agent search smoke
        run: npm run eval:super-agent-search

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build
