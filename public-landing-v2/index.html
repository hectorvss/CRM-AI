<!-- Bootstrap Supabase client from /api/public/config (same as landing v1) -->
<script>
  (function bootstrapSupabase() {
    window.__supabaseReady = false;
    fetch('/api/public/config', { credentials: 'omit' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (cfg) {
        if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          window.__SUPABASE_CONFIG__ = null;
          window.__supabase = null;
        } else {
          window.__SUPABASE_CONFIG__ = cfg;
          try {
            window.__supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
              auth: { persistSession: true, autoRefreshToken: true }
            });
          } catch (e) {
            console.error('[Clain] Supabase init failed', e);
            window.__supabase = null;
          }
        }
      })
      .catch(function () { window.__supabase = null; })
      .finally(function () {
        window.__supabaseReady = true;
        window.dispatchEvent(new Event('supabase-ready'));
      });
  })();
</script>
