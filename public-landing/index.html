<!-- Bootstrap Supabase client from server-provided public config -->
<script>
  (function bootstrapSupabase() {
    window.__supabaseReady = false;
    fetch('/api/public/config', { credentials: 'omit' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (cfg) {
        if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          console.warn('[Clain] Supabase config not available — auth disabled');
          window.__SUPABASE_CONFIG__ = null;
          window.__supabase = null;
        } else {
          window.__SUPABASE_CONFIG__ = cfg;
          try {
            var lib = window.supabase;
            window.__supabase = lib.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
              auth: { persistSession: true, autoRefreshToken: true }
            });
          } catch (e) {
            console.error('[Clain] Failed to init Supabase client', e);
            window.__supabase = null;
          }
        }
      })
      .catch(function (err) {
        console.warn('[Clain] /api/public/config failed', err);
        window.__SUPABASE_CONFIG__ = null;
        window.__supabase = null;
      })
      .finally(function () {
        window.__supabaseReady = true;
        window.dispatchEvent(new Event('supabase-ready'));
      });
  })();
</script>
